<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
    }

    .calculator {
      width: 280px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }

    .display input {
      width: 100%;
      height: 40px;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 10px;
      background-color: #f9f9f9;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .button {
      width: 100%;
      height: 50px;
      font-size: 18px;
      background-color: #f0f0f0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .button:hover {
      background-color: #ddd;
    }

    .button:active {
      background-color: #bbb;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <input type="text" id="screen" disabled>
    </div>
    <div class="buttons">
      <button class="button" onclick="appendToScreen('7')">7</button>
      <button class="button" onclick="appendToScreen('8')">8</button>
      <button class="button" onclick="appendToScreen('9')">9</button>
      <button class="button" onclick="appendToScreen('+')">+</button>

      <button class="button" onclick="appendToScreen('4')">4</button>
      <button class="button" onclick="appendToScreen('5')">5</button>
      <button class="button" onclick="appendToScreen('6')">6</button>
      <button class="button" onclick="appendToScreen('-')">−</button>

      <button class="button" onclick="appendToScreen('1')">1</button>
      <button class="button" onclick="appendToScreen('2')">2</button>
      <button class="button" onclick="appendToScreen('3')">3</button>
      <button class="button" onclick="appendToScreen('*')">×</button>

      <button class="button" onclick="appendToScreen('0')">0</button>
      <button class="button" onclick="clearScreen()">C</button>
      <button class="button" onclick="calculate()">=</button>
      <button class="button" onclick="appendToScreen('/')">÷</button>
    </div>
  </div>
  
  <script>
    let screen = document.getElementById('screen');

    // Function to append the clicked button to the screen
    function appendToScreen(value) {
      screen.value += value;
    }

    // Function to clear the screen
    function clearScreen() {
      screen.value = '';
    }

    // Function to calculate the result
    function calculate() {
      try {
        screen.value = eval(screen.value);
      } catch (e) {
        screen.value = 'Error';
      }
    }

    // Keyboard support for calculator
    document.addEventListener('keydown', (event) => {
      if (event.key >= '0' && event.key <= '9') {
        appendToScreen(event.key);
      } else if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
        appendToScreen(event.key);
      } else if (event.key === 'Enter') {
        calculate();
      } else if (event.key === 'Escape') {
        clearScreen();
      }
    });
  </script>
</body>
</html>
